name: Build and Release

on:
  push:
    tags:
      - "v*"          # Run on version tags like v1.0.0
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write      # Needed to create GitHub Releases

jobs:
  build-desktop:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            task: packageDeb
            artifact: "composeApp/build/compose/binaries/main/deb/*.deb"
            name: linux-deb
          - os: ubuntu-latest
            task: packageRpm
            artifact: "composeApp/build/compose/binaries/main/rpm/*.rpm"
            name: linux-rpm
          - os: macos-latest
            task: packageDmg
            artifact: "composeApp/build/compose/binaries/main/dmg/*.dmg"
            name: macos-dmg
          - os: macos-latest
            task: packagePkg
            artifact: "composeApp/build/compose/binaries/main/pkg/*.pkg"
            name: macos-pkg
          - os: windows-latest
            task: packageMsi
            artifact: "composeApp/build/compose/binaries/main/msi/*.msi"
            name: windows-msi
          - os: windows-latest
            task: packageExe
            artifact: "composeApp/build/compose/binaries/main/exe/*.exe"
            name: windows-exe

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Point packaging at full JDK
        shell: bash
        run: echo "JPACKAGE_JDK=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # RPM builds need rpmbuild
      - name: Install rpmbuild (Linux RPM only)
        if: matrix.name == 'linux-rpm'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build ${{ matrix.name }}
        run: ./gradlew :composeApp:${{ matrix.task }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    name: android-apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android release APK
        run: ./gradlew :composeApp:assembleRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp/build/outputs/apk/release/*.apk
          if-no-files-found: error

  # ── Create a GitHub Release when a tag is pushed ──
  release:
    needs: [build-desktop, build-android]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

